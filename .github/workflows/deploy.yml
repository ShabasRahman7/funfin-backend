name: LMS FastAPI CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: lms-fastapi-prod
  cancel-in-progress: true

jobs:
  ci:
    name: Lint and Import Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile sources
        run: python -m compileall -q app

      - name: Import app objects
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/ci-check
          JWT_SECRET: ci-secret
        run: |
          python -c "from app.client_main import app as c; from app.admin_main import app as a; print('client routes:', len(c.routes)); print('admin routes:', len(a.routes))"

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            APP_DIR="${{ secrets.APP_DIR }}"
            cd "$APP_DIR"

            git fetch origin main
            git checkout main
            git pull origin main

            if [ ! -d venv ]; then
              python3 -m venv venv
            fi

            ./venv/bin/pip install --upgrade pip
            ./venv/bin/pip install -r requirements.txt

            if [ ! -f ecosystem.config.cjs ]; then
              echo "ecosystem.config.cjs not found in $APP_DIR"
              exit 1
            fi

            pm2 startOrReload ecosystem.config.cjs --update-env
            pm2 save
